services:
  postgres:
    image: postgres:16-alpine
    container_name: course-postgres
    environment:
      POSTGRES_USER: course_user
      POSTGRES_PASSWORD: course_pass
      POSTGRES_DB: course_db
    ports:
      - "5432:5432"
    volumes:
      - course-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U course_user -d course_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: course-redis
    ports:
      - "6379:6379"
    volumes:
      - course-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: course-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - course-minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    container_name: course-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

  celery-worker:
    build: .
    container_name: course-celery-worker
    command: celery -A app.core.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://course_user:course_pass@course-postgres:5432/course_db
      REDIS_URL: redis://course-redis:6379/0
      CELERY_BROKER_URL: redis://course-redis:6379/0
      CELERY_RESULT_BACKEND: redis://course-redis:6379/0
      MINIO_ENDPOINT: course-minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_SECURE: "false"
      APP_SECRET_KEY: super-secret-key-change-in-production-min-32-chars
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-beat:
    build: .
    container_name: course-celery-beat
    command: celery -A app.core.celery_app beat --loglevel=info
    environment:
      CELERY_BROKER_URL: redis://course-redis:6379/0
      CELERY_RESULT_BACKEND: redis://course-redis:6379/0
      APP_SECRET_KEY: super-secret-key-change-in-production-min-32-chars
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  flower:
    image: mher/flower
    container_name: course-flower
    command: celery --broker=redis://course-redis:6379/0 flower
    ports:
      - "5555:5555"
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  course-postgres-data:
    name: course-platform-postgres
  course-redis-data:
    name: course-platform-redis
  course-minio-data:
    name: course-platform-minio

networks:
  default:
    name: course-platform-net